name: Build APK
on:
  workflow_dispatch:
    inputs:
      app_url:
        description: Target URL
        required: true
      app_name:
        description: App Name
        required: true
      package_name:
        description: Package Name
        required: true
      version_name:
        description: Version Name
        required: true
        default: 1.0.0
      icon_url:
        description: Icon Image URL
        required: true
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Inject parameters
        run: |
          sed -i 's|{{APP_URL}}|${{ github.event.inputs.app_url }}|g' app/src/main/java/com/webviewapp/MainActivity.kt
          PKG="${{ github.event.inputs.package_name }}"
          sed -i "s|{{APP_PACKAGE}}|${PKG}|g" app/src/main/AndroidManifest.xml app/build.gradle
          NAME="${{ github.event.inputs.app_name }}"
          sed -i "s|{{APP_NAME}}|${NAME}|g" app/src/main/res/values/strings.xml app/src/main/AndroidManifest.xml
          VER="${{ github.event.inputs.version_name }}"
          VC=$(echo "$VER" | awk -F. '{ printf "%d%02d%02d", $1, $2, $3 }')
          sed -i "s|{{VERSION_NAME}}|${VER}|g" app/build.gradle
          sed -i "s|{{VERSION_CODE}}|${VC}|g" app/build.gradle
          PKG_PATH=$(echo $PKG | sed 's/\./\//g')
          echo "PKG_PATH is: $PKG_PATH"
          mkdir -p app/src/main/java/$PKG_PATH
          sed -i "s|package com.webviewapp|package $PKG|g" app/src/main/java/com/webviewapp/*.kt
          mv app/src/main/java/com/webviewapp/*.kt app/src/main/java/$PKG_PATH/
          sed -i "s|com.webviewapp|$PKG|g" app/src/main/res/layout/activity_main.xml

      - name: Process icon
        env:
          ICON_URL: ${{ github.event.inputs.icon_url }}
        run: |
          pip install Pillow -q
          python3 Scripts/process_icon.py

      - name: Build APK
        run: |
          gradle assembleRelease --no-daemon

      - name: Sign APK
        run: |
          echo "=== Build outputs ==="
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk dir"
          find app/build/outputs -name '*.apk' 2>/dev/null | head -20 || true
          KS_B64="${{ secrets.KEYSTORE_BASE64 }}"
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 --decode > /tmp/release.keystore
            KS_PASS="${{ secrets.KEYSTORE_PASSWORD }}"
            KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            KEY_PASS="${{ secrets.KEY_PASSWORD }}"
          else
            keytool -genkey -v -keystore /tmp/release.keystore -alias debugkey -keyalg RSA -keysize 2048 -validity 3650 -storepass android -keypass android -dname "CN=Debug,O=Debug,C=US" -noprompt
            KS_PASS="android"
            KEY_ALIAS="debugkey"
            KEY_PASS="android"
          fi
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          SAFE=$(echo "${{ github.event.inputs.app_name }}" | tr ' /' '__' | LC_ALL=C tr -cd 'A-Za-z0-9_.-')
          [ -z "$SAFE" ] && SAFE="app"
          VER="${{ github.event.inputs.version_name }}"
          mkdir -p /tmp/signed
          APK=$(find app/build/outputs/apk -name '*.apk' 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found. Contents of app/build/outputs:"
            find app/build/outputs -type f 2>/dev/null | head -30
            exit 1
          fi
          echo "Signing: $APK"
          OUT="/tmp/signed/${SAFE}_${VER}.apk"
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign -f -p 4 "$APK" /tmp/aligned.apk
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks /tmp/release.keystore --ks-pass "pass:$KS_PASS" \
            --ks-key-alias "$KEY_ALIAS" --key-pass "pass:$KEY_PASS" \
            --out "$OUT" /tmp/aligned.apk
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner verify "$OUT"
          echo "Signed: $OUT"
          echo "SIGNED_DIR=/tmp/signed" >> $GITHUB_ENV
          echo "APK_NAME=${SAFE}_${VER}" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.SIGNED_DIR }}/*.apk
          retention-days: 7
          if-no-files-found: error
