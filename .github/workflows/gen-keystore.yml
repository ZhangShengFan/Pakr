name: Generate Keystore

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: "Key alias (e.g. mykey)"
        required: true
        default: "mykey"
      key_password:
        description: "Key password (min 6 chars)"
        required: true
      store_password:
        description: "Keystore password (min 6 chars)"
        required: true
      dname:
        description: "DN (e.g. CN=MyApp,O=MyOrg,C=CN)"
        required: true
        default: "CN=MyApp,O=MyOrg,C=CN"

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "${{ github.event.inputs.dname }}" \
            -noprompt

      - name: Output base64
        run: |
          echo "======== KEYSTORE_BASE64 START ========"
          base64 -w0 release.keystore
          echo ""
          echo "======== KEYSTORE_BASE64 END ========"
          echo ""
          echo "KEY_ALIAS    : ${{ github.event.inputs.key_alias }}"
          echo "KEY_PASSWORD : ${{ github.event.inputs.key_password }}"
          echo "STORE_PASSWORD: ${{ github.event.inputs.store_password }}"
